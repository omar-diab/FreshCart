<nav class="bg-main-light sticky top-0 z-50 shadow-[--shadow]">
  <div class="mx-auto max-w-7xl px-4">

    <!-- top bar -->
    <div class="flex h-16 flex-nowrap items-center justify-between gap-4">

      <!-- left: logo + links -->
      <div class="flex shrink-0 items-center gap-6">
        <a routerLink="home" class="flex shrink-0 items-center">
          <img src="./assets/images/freshcart-logo.svg" alt="FreshCart Logo" class="block h-8 w-auto">
        </a>

        <ul class="m-0 hidden list-none items-center gap-6 p-0 lg:flex">
          @for (link of links; track link.path) {
          <li class="flex items-center">
            <a class="nav-link inline-flex items-center whitespace-nowrap p-0 text-sm leading-none hover:text-[--main-color]"
              routerLinkActive="active-link" [routerLink]="link.path">
              {{ link.label }}
            </a>
          </li>
          }
        </ul>
      </div>

      <!-- middle: search bar goes here later -->
      <div class="hidden min-w-0 flex-1 lg:block"></div>

      <!-- right: cart + sign out -->
      <div class="hidden shrink-0 items-center gap-6 lg:flex">
        <a class="nav-link relative inline-flex items-center p-0 leading-none hover:text-main"
          routerLinkActive="active-link" routerLink="cart">
          <i class="fa-solid fa-cart-shopping text-lg leading-none"></i>
          @if (cartCount() > 0) {
          <span
            class="absolute -top-2.5 -right-3 flex h-5 min-w-5 items-center justify-center rounded-full bg-red-500 px-1 text-[11px] leading-none text-white">
            {{ cartCount() }}
          </span>
          }
        </a>
        <a (click)="logedout()"
          class="nav-link cursor-pointer inline-flex items-center p-0 text-sm leading-none hover:text-[--main-color)]">
          Sign Out
        </a>
      </div>

      <!-- hamburger -->
      <button (click)="toggle()" type="button" aria-label="Toggle navigation" [attr.aria-expanded]="isOpen()"
        class="cr inline-flex shrink-0 items-center rounded p-2 lg:hidden">
        <i class="fa-solid text-xl leading-none" [class.fa-bars]="!isOpen()" [class.fa-xmark]="isOpen()"></i>
      </button>
    </div>

    <!-- mobile panel -->
    <div class="overflow-hidden transition-[max-height] duration-300 lg:hidden"
      [class]="isOpen() ? 'max-h-96' : 'max-h-0'">
      <ul class="m-0 flex list-none flex-col gap-1 p-0 py-2">
        @for (link of links; track link.path) {
        <li>
          <a class="nav-link block rounded px-2 py-3 hover:bg-white/60" routerLinkActive="active-link"
            [routerLink]="link.path" (click)="close()">
            {{ link.label }}
          </a>
        </li>
        }
      </ul>

      <div class="flex items-center justify-between border-t border-gray-300 py-3">
        <a (click)="logedout()" class="nav-link cr px-2">Sign Out</a>
        <a class="nav-link flex items-center gap-2 px-2" routerLink="cart" (click)="close()">
          <i class="fa-solid fa-cart-shopping"></i>
        </a>
      </div>
    </div>

  </div>
</nav>
